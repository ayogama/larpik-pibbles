<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LARPIK</title>
<link rel="icon" type="image/gif" href="https://media1.tenor.com/m/akwQ41N209EAAAAd/cute-dog-pibble.gif">
<meta name="theme-color" content="#000000">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* 
  =========================================
  ||  ELEVATED ASCII / TERMINAL MONO     ||
  =========================================
*/
:root {
  --bg: #000000;
  --fg: #ffffff;
  --dim: #333333;
  --glow: 0 0 10px rgba(255,255,255,0.5), 0 0 20px rgba(255,255,255,0.3);
  --font-main: 'Space Mono', monospace;
  --font-ascii: 'VT323', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--bg);
  color: var(--fg);
  font-family: var(--font-main);
  min-height: 100vh;
  overflow-x: hidden;
  text-transform: uppercase;
  animation: crtTurnOn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
}

/* CRT BOOT SEQUENCE */
@keyframes crtTurnOn {
  0% { transform: scale(1, 0.001) translate3d(0, 0, 0); filter: brightness(10); opacity: 0; }
  40% { transform: scale(1, 0.001) translate3d(0, 0, 0); filter: brightness(10); opacity: 1; }
  100% { transform: scale(1, 1) translate3d(0, 0, 0); filter: brightness(1); opacity: 1; }
}

/* SCANLINES (Placed behind media) */
.scanlines {
  position: fixed; inset: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
  background-size: 100% 4px;
  z-index: 10; pointer-events: none;
}

/* LAYOUT WRAPPERS */
.app-wrap { position: relative; z-index: 20; }
body.on-admin .terminal-app { display: none; }
body.on-admin .admin-app { display: block; }

/* HEADER & ASCII LOGO */
.hdr {
  display: flex; flex-direction: column; align-items: center;
  padding: 50px 20px 30px; border-bottom: 1px solid var(--dim);
}
.ascii-logo {
  font-family: var(--font-ascii); font-size: clamp(14px, 2vw, 24px);
  line-height: 1; white-space: pre; color: var(--fg);
  text-align: center; margin-bottom: 15px;
  text-shadow: var(--glow);
}
.sub-logo { font-size: 1rem; letter-spacing: 0.8em; font-weight: 700; color: var(--fg); }

/* NAVIGATION */
.nav {
  display: flex; justify-content: center; gap: 30px; padding: 25px;
  border-bottom: 1px solid var(--dim); flex-wrap: wrap;
}
.nav-btn {
  background: transparent; color: var(--dim); border: none;
  font-family: var(--font-main); font-size: 1.1rem; font-weight: 700;
  cursor: pointer; transition: all 0.3s ease; position: relative;
}
.nav-btn:hover { color: var(--fg); text-shadow: var(--glow); transform: translateY(-2px); }
.nav-btn.active { color: var(--fg); text-shadow: var(--glow); }
.nav-btn.active::before { content: "> "; color: var(--fg); position: absolute; left: -20px; }
.nav-btn.active::after { content: "_"; animation: blink 1s infinite step-end; position: absolute; right: -15px; }

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* MAIN CONTENT */
.main { padding: 40px; max-width: 1600px; margin: 0 auto; }
.panel { display: none; animation: glitchIn 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
.panel.active { display: block; }
@keyframes glitchIn {
  0% { opacity: 0; transform: translateX(-10px); filter: blur(4px); }
  100% { opacity: 1; transform: translateX(0); filter: blur(0); }
}

/* 1:1 STRETCHED GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 30px;
}

/* MEDIA CARDS */
.card {
  aspect-ratio: 1 / 1; /* FORCES 1:1 SQUARE */
  border: 1px solid var(--dim);
  position: relative;
  background: var(--bg);
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 50; /* POPS ABOVE SCANLINES */
}

/* ANIMATED CORNER BRACKETS */
.card::before, .card::after {
  content: ''; position: absolute; width: 15px; height: 15px;
  border: 2px solid transparent; transition: all 0.3s ease; z-index: 60; pointer-events: none;
}
.card::before { top: 15px; left: 15px; border-top-color: var(--fg); border-left-color: var(--fg); opacity: 0; }
.card::after { bottom: 15px; right: 15px; border-bottom-color: var(--fg); border-right-color: var(--fg); opacity: 0; }

.card:hover {
  border-color: var(--fg);
  box-shadow: var(--glow);
  transform: scale(1.03);
  z-index: 100;
}
.card:hover::before { top: -2px; left: -2px; opacity: 1; }
.card:hover::after { bottom: -2px; right: -2px; opacity: 1; }

.card img, .card video {
  width: 100%; height: 100%;
  object-fit: fill; /* STRICTLY STRETCHES TO 1:1 */
  display: block;
  filter: grayscale(100%);
  transition: filter 0.4s ease;
}
.card:hover img, .card:hover video { filter: grayscale(0%); }

/* SEXY VIDEO CONTROLS */
.vw { width: 100%; height: 100%; position: relative; }
.po {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.5); opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 55;
}
.vw.ip .po { opacity: 1; pointer-events: auto; }

.pi {
  color: var(--fg); font-size: 3.5rem; text-shadow: var(--glow);
  transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.vw:hover .pi { transform: scale(1.1); }

.cc {
  position: absolute; bottom: 0; left: 0; right: 0; padding: 15px;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
  display: flex; align-items: center; gap: 15px; opacity: 0; transition: opacity 0.3s ease; z-index: 55;
}
.vw:hover .cc, .vw.ip .cc { opacity: 1; }
.pb { flex-grow: 1; height: 2px; background: var(--dim); cursor: pointer; position: relative; }
.pf { height: 100%; width: 0%; background: var(--fg); pointer-events: none; box-shadow: var(--glow); }
.vb { background: none; border: none; color: var(--fg); font-family: var(--font-main); font-weight: 700; cursor: pointer; font-size: 0.9rem; }
.vb:hover { text-shadow: var(--glow); }

/* UI ELEMENTS */
.lmw { text-align: center; margin-top: 50px; padding-bottom: 40px; }
.lm {
  background: transparent; color: var(--fg); border: 1px solid var(--dim);
  font-family: var(--font-main); font-weight: 700; font-size: 1.2rem; padding: 12px 40px;
  cursor: pointer; transition: all 0.3s ease; letter-spacing: 0.2em;
}
.lm:hover { border-color: var(--fg); box-shadow: var(--glow); background: var(--fg); color: var(--bg); }
.lm:disabled { opacity: 0; pointer-events: none; }
.empty { text-align: center; padding: 100px 0; font-weight: 700; color: var(--dim); font-size: 1.2rem; letter-spacing: 0.2em; }

/* LIGHTBOX */
.lb { position: fixed; inset: 0; z-index: 99999; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
.lb.open { display: flex; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.lb img { max-width: 100%; max-height: 90vh; object-fit: fill; border: 1px solid var(--fg); box-shadow: var(--glow); }
.lbc { position: absolute; top: 30px; right: 40px; font-size: 2rem; font-weight: 700; color: var(--fg); cursor: pointer; transition: all 0.2s; }
.lbc:hover { text-shadow: var(--glow); transform: scale(1.1); }

/* FOOTER */
.ftr { text-align: center; padding: 40px; font-weight: 700; border-top: 1px solid var(--dim); letter-spacing: 0.5em; font-size: 0.9rem; }

/* ADMIN APP */
.admin-app { display: none; padding: 60px 20px; max-width: 800px; margin: 0 auto; position: relative; z-index: 20; }
.adm-login { max-width: 400px; margin: 15vh auto 0; border: 1px solid var(--dim); padding: 50px 40px; text-align: center; transition: all 0.3s; }
.adm-login:hover { border-color: var(--fg); box-shadow: var(--glow); }
.adm-login input { width: 100%; background: var(--bg); border: 1px solid var(--dim); color: var(--fg); padding: 12px; font-family: var(--font-main); margin-bottom: 25px; outline: none; text-align: center; text-transform: uppercase; transition: all 0.3s; }
.adm-login input:focus { border-color: var(--fg); box-shadow: var(--glow); }
.adm-login button { width: 100%; background: var(--fg); color: var(--bg); border: none; padding: 12px; font-family: var(--font-main); font-weight: 700; cursor: pointer; font-size: 1.1rem; transition: all 0.2s; }
.adm-login button:hover { box-shadow: var(--glow); }
.adm-err { color: var(--bg); background: var(--fg); margin-top: 20px; padding: 8px; font-weight: 700; animation: blink 1s infinite step-end; }

.adm-panel { display: none; border: 1px solid var(--fg); padding: 30px; box-shadow: var(--glow); }
.adm-panel.vis { display: block; animation: glitchIn 0.3s ease; }
.adm-hdr { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--dim); padding-bottom: 20px; margin-bottom: 30px; }
.adm-hdr h1 { font-size: 2rem; text-shadow: var(--glow); }
.adm-hdr button { background: transparent; border: 1px solid var(--fg); color: var(--fg); padding: 8px 20px; cursor: pointer; font-family: var(--font-main); font-weight: 700; transition: all 0.2s; }
.adm-hdr button:hover { background: var(--fg); color: var(--bg); box-shadow: var(--glow); }

.adm-row { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
.adm-row select, .adm-row input { background: var(--bg); border: 1px solid var(--dim); color: var(--fg); padding: 12px; font-family: var(--font-main); outline: none; flex-grow: 1; transition: border-color 0.3s; }
.adm-row select:focus, .adm-row input:focus { border-color: var(--fg); }
.adm-btn { background: var(--fg); color: var(--bg); border: none; padding: 12px 30px; font-family: var(--font-main); font-weight: 700; cursor: pointer; transition: all 0.2s; }
.adm-btn:hover { box-shadow: var(--glow); }

.adm-ftabs { display: flex; gap: 15px; margin: 40px 0 20px; border-bottom: 1px dashed var(--dim); padding-bottom: 15px; }
.adm-ft { padding: 5px 10px; font-weight: 700; color: var(--dim); cursor: pointer; transition: all 0.2s; }
.adm-ft:hover { color: var(--fg); }
.adm-ft.active { color: var(--bg); background: var(--fg); box-shadow: var(--glow); }
.adm-flist { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
.adm-fi { background: var(--bg); border: 1px solid var(--dim); padding: 10px; display: flex; flex-direction: column; transition: all 0.2s; }
.adm-fi:hover { border-color: var(--fg); }
.adm-fi img { width: 100%; height: 100px; object-fit: fill; margin-bottom: 10px; filter: grayscale(100%); }
.adm-fi .name { font-size: 0.75rem; word-break: break-all; margin-bottom: 10px; flex-grow: 1; }
.adm-fi .del { background: transparent; border: 1px solid var(--fg); color: var(--fg); padding: 6px; font-weight: 700; cursor: pointer; font-family: var(--font-main); transition: all 0.2s; }
.adm-fi .del:hover { background: var(--fg); color: var(--bg); box-shadow: var(--glow); }
.adm-fi .del.git { border: 1px dashed var(--dim); color: var(--dim); pointer-events: none; }

#loader { position: fixed; top: 20px; right: 20px; font-weight: 700; font-family: var(--font-main); z-index: 9999; animation: blink 1s infinite step-end; text-shadow: var(--glow); }
</style>
</head>
<body>

<script>
(function(){
  var W="https://worker.vokemane.workers.dev", B=12;
  var VE=[".mp4",".webm",".mov"],GE=[".gif"];
  function isV(n){return VE.some(function(e){return n.toLowerCase().endsWith(e)})}
  function isG(n){return GE.some(function(e){return n.toLowerCase().endsWith(e)})}
  function num(n){var m=n.match(/\d+/);return m?parseInt(m[0]):999999}
  
  var D={videos:[],gifs:[],pictures:[],death:[]};
  var S={videos:0,gifs:0,pictures:0,death:0};
  var GM={videos:"gv",gifs:"gg",pictures:"gp",death:"gd"};
  
  var isAdmin=location.pathname==="/admin"||location.pathname==="/admin/";
  if(isAdmin) document.body.classList.add("on-admin");

  // Nav Logic
  document.querySelectorAll(".nav-btn").forEach(function(t){
    t.addEventListener("click",function(){
      document.querySelectorAll(".nav-btn").forEach(function(x){x.classList.remove("active");});
      document.querySelectorAll(".panel").forEach(function(x){x.classList.remove("active");});
      t.classList.add("active");
      document.getElementById("tab-"+t.dataset.tab).classList.add("active");
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });

  // Lightbox
  var LB=document.getElementById("lb"), LBI=document.getElementById("lbi");
  document.getElementById("lbc").addEventListener("click",function(){LB.classList.remove("open")});
  LB.addEventListener("click",function(e){if(e.target===LB)LB.classList.remove("open")});
  function openLB(s){LBI.src=s;LB.classList.add("open")}

  // Text Icons
  var VolI='[ VOL ]';
  var MuteI='[ MUTE ]';

  // Video Logic
  function initVid(card){
    var w=card.querySelector(".vw"), v=w.querySelector("video"), po=w.querySelector(".po"), pb=w.querySelector(".pb"), pf=w.querySelector(".pf"), vb=w.querySelector(".vb");
    function tog(){ if(v.paused){v.play(); w.classList.remove("ip"); po.style.display="none";} else {v.pause(); w.classList.add("ip"); po.style.display="flex";} }
    v.addEventListener("click",tog); po.addEventListener("click",tog);
    v.addEventListener("timeupdate",function(){ if(pf&&v.duration) pf.style.width=(v.currentTime/v.duration*100)+"%"; });
    v.addEventListener("ended",function(){ w.classList.add("ip"); po.style.display="flex"; });
    if(pb) pb.addEventListener("click",function(e){ e.stopPropagation(); var r=pb.getBoundingClientRect(); v.currentTime=((e.clientX-r.left)/r.width)*v.duration; });
    if(vb){ vb.addEventListener("click",function(e){ e.stopPropagation(); v.muted=!v.muted; vb.innerHTML=v.muted?MuteI:VolI; }); }
  }

  function mkVid(it){
    var c=document.createElement("div"); c.className="card";
    c.innerHTML='<div class="vw ip"><video src="'+it.src+'" playsinline preload="metadata"></video><div class="po"><div class="pi">▶</div></div><div class="cc"><button class="vb">'+VolI+'</button><div class="pb"><div class="pf"></div></div></div></div>';
    initVid(c); return c;
  }
  function mkImg(it){
    var c=document.createElement("div"); c.className="card";
    c.innerHTML='<img src="'+it.src+'" loading="lazy">';
    c.querySelector("img").addEventListener("click",function(){openLB(it.src)}); return c;
  }

  function render(tk){
    var f=D[tk]; if(!f||!f.length)return;
    var grid=document.getElementById(GM[tk]), btn=document.querySelector('.lm[data-tab="'+tk+'"]');
    var s=S[tk], e=Math.min(s+B,f.length);
    for(var i=s;i<e;i++){ grid.appendChild(isV(f[i].name) ? mkVid(f[i]) : mkImg(f[i])); }
    S[tk]=e;
    if(e>=f.length) btn.disabled=true;
    if(f.length>0) btn.style.display="";
  }

  document.querySelectorAll(".lm").forEach(function(b){b.addEventListener("click",function(){render(b.dataset.tab)})});

  // Fetch Logic
  var gitOK=false, r2OK=false, gitD={}, r2D={};
  var ldr = document.getElementById("loader");
  function merge(){
    if(!gitOK||!r2OK)return;
    ["vids","gifs","pics","death"].forEach(function(folder,i){
      var tk=["videos","gifs","pictures","death"][i], merged=[], seen={};
      (gitD[folder]||[]).forEach(function(n){if(!seen[n]){seen[n]=true;merged.push({name:n,src:folder+"/"+n})}});
      (r2D[folder]||[]).forEach(function(n){if(!seen[n]){seen[n]=true;merged.push({name:n,src:W+"/file/"+folder+"/"+n})}});
      merged.sort(function(a,b){return num(a.name)-num(b.name)});
      D[tk]=merged;
      var g=document.getElementById(GM[tk]); g.innerHTML="";
      if(!D[tk].length) g.innerHTML='<div class="empty">[ NULL ]</div>';
      else render(tk);
    });
    ldr.style.display = "none";
    
    var visited = localStorage.getItem("larpik_visited");
    fetch(W + "/visitors" + (visited ? "" : "?hit=1")).then(function(){ if(!visited)localStorage.setItem("larpik_visited","true"); }).catch(function(){});
  }

  fetch("files.json?v="+Date.now()).then(function(r){return r.json()}).then(function(d){gitD=d}).catch(function(){}).finally(function(){gitOK=true;merge()});
  var r2c=0;
  ["vids","gifs","pics","death"].forEach(function(f){
    fetch(W+"/list/"+f).then(function(r){return r.json()}).then(function(files){
      if(Array.isArray(files)) r2D[f]=files.map(function(x){return typeof x==="string"?x:x.name});
    }).catch(function(){}).finally(function(){ r2c++; if(r2c>=4){r2OK=true;merge();} });
  });

  // Admin
  var TOKEN="", admFolder="vids";
  document.getElementById("adm-go").addEventListener("click",doLogin);
  document.getElementById("adm-pass").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin()});
  document.getElementById("adm-out").addEventListener("click",function(){TOKEN="";document.getElementById("adm-panel").classList.remove("vis");document.getElementById("adm-login").style.display="block";document.getElementById("adm-pass").value=""});
  document.getElementById("adm-upload-btn").addEventListener("click",doUpload);

  function doLogin(){
    var pass=document.getElementById("adm-pass").value, err=document.getElementById("adm-err");
    fetch(W+"/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pass})})
    .then(function(r){return r.json()}).then(function(d){
      if(d.ok){TOKEN=d.token;document.getElementById("adm-login").style.display="none";document.getElementById("adm-panel").classList.add("vis"); err.style.display="none"; initAdm()}
      else {err.textContent="[ ERR ] ACCESS DENIED"; err.style.display="block";}
    }).catch(function(){err.textContent="[ ERR ] CONNECTION"; err.style.display="block";});
  }

  function initAdm(){
    var tabs=document.getElementById("adm-ftabs"); tabs.innerHTML="";
    ["vids","gifs","pics","death"].forEach(function(f){
      var t=document.createElement("div"); t.className="adm-ft"+(f===admFolder?" active":""); t.textContent="[ "+f.toUpperCase()+" ]";
      t.addEventListener("click",function(){
        admFolder=f; document.querySelectorAll(".adm-ft").forEach(function(x){x.classList.remove("active")});
        t.classList.add("active"); loadAdmFiles();
      });
      tabs.appendChild(t);
    });
    loadAdmFiles();
  }

  function loadAdmFiles(){
    var list=document.getElementById("adm-flist"); list.innerHTML='<div>[ FETCHING... ]</div>';
    var allFiles=[], done=0;
    fetch("files.json?v="+Date.now()).then(function(r){return r.json()}).then(function(data){
      (data[admFolder]||[]).forEach(function(n){allFiles.push({name:n,source:"GIT"})})
    }).catch(function(){}).finally(chk);
    fetch(W+"/list/"+admFolder).then(function(r){return r.json()}).then(function(files){
      if(Array.isArray(files)) files.forEach(function(f){allFiles.push({name:typeof f==="string"?f:f.name,source:"R2"})})
    }).catch(function(){}).finally(chk);
    
    function chk(){
      done++; if(done<2)return;
      var seen={}, final=[];
      allFiles.forEach(function(f){var k=f.name+"|"+f.source;if(!seen[k]){seen[k]=true;final.push(f)}});
      final.sort(function(a,b){return num(a.name)-num(b.name)});
      list.innerHTML="";
      if(!final.length){list.innerHTML='<div>[ NULL ]</div>';return}
      
      final.forEach(function(f){
        var item=document.createElement("div"); item.className="adm-fi";
        var isImg=f.name.match(/\.(jpg|jpeg|png|webp|gif)$/i);
        var src=f.source==="R2"?W+"/file/"+admFolder+"/"+f.name:admFolder+"/"+f.name;
        item.innerHTML=(isImg?'<img src="'+src+'" loading="lazy" onerror="this.style.display=\'none\'">':'')+'<div class="name">'+f.name+'</div><button class="del'+(f.source==="GIT"?" git":"")+'">[ X ]</button>';
        if(f.source==="R2") item.querySelector(".del").addEventListener("click",function(){
          if(!confirm("DEL?"))return;
          fetch(W+"/delete",{method:"POST",headers:{"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"},body:JSON.stringify({key:admFolder+"/"+f.name})})
          .then(function(){loadAdmFiles()}).catch(function(){alert("ERR")})
        });
        list.appendChild(item);
      });
    }
  }

  function doUpload(){
    var files=document.getElementById("adm-files").files, folder=document.getElementById("adm-folder").value, status=document.getElementById("adm-status"), btn=document.getElementById("adm-upload-btn");
    if(!files.length) return;
    btn.disabled=true; status.textContent="[ UPLOADING... ]";
    var done=0, total=files.length;
    Array.from(files).forEach(function(file){
      var fd=new FormData(); fd.append("file",file); fd.append("folder",folder);
      fetch(W+"/upload",{method:"POST",headers:{"Authorization":"Bearer "+TOKEN},body:fd})
      .then(function(r){return r.json()}).then(function(){
        done++;
        if(done===total){status.textContent="[ DONE ]";btn.disabled=false;loadAdmFiles();document.getElementById("adm-files").value=""}
      }).catch(function(){ done++; if(done===total) {status.textContent="[ ERR ]"; btn.disabled=false;} });
    });
  }
})();
</script>
</body>
</html>
