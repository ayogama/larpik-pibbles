<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LARPIK</title>
<link rel="icon" type="image/gif" href="https://media1.tenor.com/m/akwQ41N209EAAAAd/cute-dog-pibble.gif">
<meta name="theme-color" content="#000000">
<style>
/* BRUTALIST MINIMALISM */
:root {
  --bg: #000;
  --fg: #fff;
  --dim: #222;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  overflow-x: hidden;
  min-height: 100vh;
  text-transform: uppercase;
}

body.on-admin .archive { display: none; }
body.on-admin .admin { display: block; }

/* TYPOGRAPHY */
.hero {
  padding: 10vh 20px;
  text-align: center;
}
.hero h1 {
  font-size: clamp(4rem, 15vw, 15rem);
  font-weight: 900;
  letter-spacing: -0.05em;
  line-height: 0.8;
  margin: 0;
}
.hero p {
  font-size: 1rem;
  letter-spacing: 0.5em;
  margin-top: 2rem;
  font-weight: 700;
}

/* FLOATING NAV */
.nav-wrap {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: var(--fg);
  color: var(--bg);
  display: flex;
  padding: 5px;
  border-radius: 50px;
  gap: 5px;
}
.nav-btn {
  background: transparent;
  border: none;
  color: var(--bg);
  font-family: var(--font);
  font-size: 0.8rem;
  font-weight: 700;
  padding: 12px 24px;
  border-radius: 40px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.2s, color 0.2s;
}
.nav-btn.active {
  background: var(--bg);
  color: var(--fg);
}

/* GRID */
.wrap {
  padding: 0 20px 150px;
  max-width: 2000px;
  margin: 0 auto;
}
.panel { display: none; }
.panel.active { display: block; }

.masonry {
  columns: 4;
  column-gap: 20px;
}
@media (max-width: 1400px) { .masonry { columns: 3; } }
@media (max-width: 900px) { .masonry { columns: 2; } }
@media (max-width: 500px) { .masonry { columns: 1; } }

/* MEDIA CARDS */
.card {
  break-inside: avoid;
  margin-bottom: 20px;
  position: relative;
  background: var(--dim);
  overflow: hidden;
}
.card img, .card video {
  width: 100%;
  display: block;
  object-fit: cover;
}

/* RAW VIDEO CONTROLS */
.vw { position: relative; cursor: pointer; }
.po {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.2s;
}
.vw.ip .po { opacity: 1; }
.pi { font-size: 3rem; font-weight: 900; }
.cc {
  position: absolute; bottom: 0; left: 0; right: 0; padding: 10px;
  display: flex; gap: 10px; align-items: center;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  opacity: 0; transition: opacity 0.2s;
}
.vw:hover .cc, .vw.ip .cc { opacity: 1; }
.pb { flex-grow: 1; height: 2px; background: rgba(255,255,255,0.3); cursor: pointer; position: relative; }
.pf { height: 100%; width: 0%; background: var(--fg); pointer-events: none; }
.cb, .vb { background: none; border: none; color: var(--fg); font-family: var(--font); font-weight: 700; cursor: pointer; font-size: 0.8rem; }
.vs { -webkit-appearance: none; width: 40px; height: 2px; background: rgba(255,255,255,0.3); }
.vs::-webkit-slider-thumb { -webkit-appearance: none; width: 8px; height: 8px; background: var(--fg); border-radius: 50%; }

/* UI ELEMENTS */
.lmw { text-align: center; margin-top: 40px; }
.lm { background: var(--fg); color: var(--bg); font-family: var(--font); font-weight: 900; font-size: 1.5rem; padding: 15px 50px; border: none; cursor: pointer; text-transform: uppercase; }
.lm:disabled { opacity: 0.2; pointer-events: none; }
.empty { text-align: center; padding: 100px; font-weight: 900; font-size: 2rem; color: var(--dim); }

/* LIGHTBOX */
.lb { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: none; align-items: center; justify-content: center; padding: 20px; }
.lb.open { display: flex; }
.lb img { max-width: 100%; max-height: 100vh; object-fit: contain; }
.lbc { position: absolute; top: 20px; right: 30px; font-size: 3rem; font-weight: 900; cursor: pointer; }

/* FOOTER */
.ftr { text-align: center; padding: 50px; font-weight: 700; letter-spacing: 0.2em; font-size: 0.8rem; }

/* ADMIN - BRUTALIST */
.admin { display: none; padding: 50px 20px; max-width: 800px; margin: 0 auto; }
.adm-login { text-align: center; margin-top: 20vh; }
.adm-login input { background: transparent; border: 2px solid var(--fg); color: var(--fg); padding: 15px; font-size: 1.5rem; width: 100%; max-width: 400px; text-transform: uppercase; font-family: var(--font); text-align: center; outline: none; }
.adm-login button { background: var(--fg); color: var(--bg); border: none; padding: 15px 40px; font-size: 1.5rem; font-weight: 900; cursor: pointer; margin-top: 20px; font-family: var(--font); }
.adm-err { color: red; margin-top: 10px; font-weight: 900; }

.adm-panel { display: none; }
.adm-panel.vis { display: block; }
.adm-hdr { display: flex; justify-content: space-between; border-bottom: 2px solid var(--dim); padding-bottom: 20px; margin-bottom: 40px; align-items: flex-end; }
.adm-hdr h1 { font-size: 3rem; line-height: 1; }
.adm-hdr button { background: var(--dim); color: var(--fg); border: none; padding: 10px 20px; font-weight: 700; cursor: pointer; }

.adm-row { display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
.adm-field select, .adm-field input { background: var(--dim); color: var(--fg); border: none; padding: 15px; font-family: var(--font); font-size: 1rem; outline: none; }
.adm-btn { background: var(--fg); color: var(--bg); font-weight: 900; font-family: var(--font); padding: 15px 30px; border: none; cursor: pointer; }

.adm-ftabs { display: flex; gap: 10px; margin-bottom: 20px; }
.adm-ft { font-weight: 900; color: var(--dim); cursor: pointer; font-size: 1.5rem; }
.adm-ft.active { color: var(--fg); }
.adm-flist { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
.adm-fi { background: var(--dim); padding: 10px; position: relative; }
.adm-fi img { width: 100%; height: 100px; object-fit: cover; margin-bottom: 10px; }
.adm-fi .name { font-size: 0.7rem; word-break: break-all; margin-bottom: 10px; }
.adm-fi .del { background: red; color: white; border: none; padding: 5px 10px; font-weight: 900; cursor: pointer; width: 100%; }
.adm-fi .del.git { opacity: 0.2; pointer-events: none; }
</style>
</head>
<body>

<div class="lb" id="lb"><div class="lbc" id="lbc">&times;</div><img id="lbi" src="" alt=""></div>

<div class="archive">
  <header class="hero">
    <h1>LARPIK</h1>
    <p>NSM</p>
  </header>

  <nav class="nav-wrap">
    <button class="nav-btn active" data-tab="videos">VIDS</button>
    <button class="nav-btn" data-tab="gifs">GIFS</button>
    <button class="nav-btn" data-tab="pictures">PICS</button>
    <button class="nav-btn" data-tab="death">DEATH</button>
  </nav>

  <main class="wrap">
    <div class="panel active" id="tab-videos">
      <div class="masonry" id="gv"></div>
      <div class="lmw"><button class="lm" data-tab="videos" style="display:none">+</button></div>
    </div>
    <div class="panel" id="tab-gifs">
      <div class="masonry" id="gg"></div>
      <div class="lmw"><button class="lm" data-tab="gifs" style="display:none">+</button></div>
    </div>
    <div class="panel" id="tab-pictures">
      <div class="masonry" id="gp"></div>
      <div class="lmw"><button class="lm" data-tab="pictures" style="display:none">+</button></div>
    </div>
    <div class="panel" id="tab-death">
      <div class="masonry" id="gd"></div>
      <div class="lmw"><button class="lm" data-tab="death" style="display:none">+</button></div>
    </div>
  </main>

  <footer class="ftr">LARPIK.COM</footer>
</div>

<div class="admin">
  <div class="adm-login" id="adm-login">
    <input type="password" id="adm-pass" placeholder="PASS" autocomplete="off">
    <br>
    <button id="adm-go">ENTER</button>
    <div class="adm-err" id="adm-err"></div>
  </div>
  
  <div class="adm-panel" id="adm-panel">
    <div class="adm-hdr">
      <h1>LARPIK</h1>
      <button id="adm-out">EXIT</button>
    </div>
    
    <div class="adm-row">
      <div class="adm-field">
        <select id="adm-folder">
          <option value="vids">VIDS</option>
          <option value="gifs">GIFS</option>
          <option value="pics">PICS</option>
          <option value="death">DEATH</option>
        </select>
      </div>
      <div class="adm-field">
        <input type="file" id="adm-files" multiple accept="video/*,image/*,.gif">
      </div>
      <button class="adm-btn" id="adm-upload-btn">UPLOAD</button>
    </div>
    <div id="adm-status" style="margin-bottom:40px; font-weight:900;"></div>

    <div class="adm-ftabs" id="adm-ftabs"></div>
    <div class="adm-flist" id="adm-flist"></div>
  </div>
</div>

<script>
(function(){
  var W="https://worker.vokemane.workers.dev", B=12;
  var VE=[".mp4",".webm",".mov"],GE=[".gif"];
  function isV(n){return VE.some(function(e){return n.toLowerCase().endsWith(e)})}
  function isG(n){return GE.some(function(e){return n.toLowerCase().endsWith(e)})}
  function num(n){var m=n.match(/\d+/);return m?parseInt(m[0]):999999}
  
  var D={videos:[],gifs:[],pictures:[],death:[]};
  var S={videos:0,gifs:0,pictures:0,death:0};
  var GM={videos:"gv",gifs:"gg",pictures:"gp",death:"gd"};
  
  var isAdmin=location.pathname==="/admin"||location.pathname==="/admin/";
  if(isAdmin) document.body.classList.add("on-admin");

  // Nav Logic
  document.querySelectorAll(".nav-btn").forEach(function(t){
    t.addEventListener("click",function(){
      document.querySelectorAll(".nav-btn").forEach(function(x){x.classList.remove("active");});
      document.querySelectorAll(".panel").forEach(function(x){x.classList.remove("active");});
      t.classList.add("active");
      document.getElementById("tab-"+t.dataset.tab).classList.add("active");
      window.scrollTo(0,0);
    });
  });

  // Lightbox
  var LB=document.getElementById("lb"), LBI=document.getElementById("lbi");
  document.getElementById("lbc").addEventListener("click",function(){LB.classList.remove("open")});
  LB.addEventListener("click",function(e){if(e.target===LB)LB.classList.remove("open")});
  function openLB(s){LBI.src=s;LB.classList.add("open")}

  // Video Player Logic
  function initVid(card){
    var w=card.querySelector(".vw"), v=w.querySelector("video"), pb=w.querySelector(".pb"), pf=w.querySelector(".pf"), vb=w.querySelector(".vb"), vs=w.querySelector(".vs");
    function tog(){ if(v.paused){v.play(); w.classList.remove("ip");} else {v.pause(); w.classList.add("ip");} }
    v.addEventListener("click",tog);
    v.addEventListener("timeupdate",function(){ if(pf&&v.duration) pf.style.width=(v.currentTime/v.duration*100)+"%"; });
    v.addEventListener("ended",function(){ w.classList.add("ip"); });
    if(pb) pb.addEventListener("click",function(e){ e.stopPropagation(); var r=pb.getBoundingClientRect(); v.currentTime=((e.clientX-r.left)/r.width)*v.duration; });
    if(vs){ vs.value=v.volume; vs.addEventListener("input",function(e){ e.stopPropagation(); v.volume=parseFloat(this.value); v.muted=v.volume===0; if(vb)vb.textContent=v.muted?"M":"U"; }); }
    if(vb){ vb.addEventListener("click",function(e){ e.stopPropagation(); v.muted=!v.muted; vb.textContent=v.muted?"M":"U"; if(vs)vs.value=v.muted?0:v.volume; }); }
  }

  function mkVid(it){
    var c=document.createElement("div"); c.className="card";
    c.innerHTML='<div class="vw ip"><video src="'+it.src+'" playsinline preload="metadata"></video><div class="po"><div class="pi">▶</div></div><div class="cc"><div class="pb"><div class="pf"></div></div><button class="vb">U</button><input type="range" class="vs" min="0" max="1" step="0.05" value="1"></div></div>';
    initVid(c); return c;
  }
  function mkImg(it){
    var c=document.createElement("div"); c.className="card";
    c.innerHTML='<img src="'+it.src+'" loading="lazy">';
    c.querySelector("img").addEventListener("click",function(){openLB(it.src)}); return c;
  }

  function render(tk){
    var f=D[tk]; if(!f||!f.length)return;
    var grid=document.getElementById(GM[tk]), btn=document.querySelector('.lm[data-tab="'+tk+'"]');
    var s=S[tk], e=Math.min(s+B,f.length);
    for(var i=s;i<e;i++){ grid.appendChild(isV(f[i].name) ? mkVid(f[i]) : mkImg(f[i])); }
    S[tk]=e;
    if(e>=f.length) btn.disabled=true;
    if(f.length>0) btn.style.display="";
  }

  document.querySelectorAll(".lm").forEach(function(b){b.addEventListener("click",function(){render(b.dataset.tab)})});

  // File Fetching Logic
  var gitOK=false, r2OK=false, gitD={}, r2D={};
  function merge(){
    if(!gitOK||!r2OK)return;
    ["vids","gifs","pics","death"].forEach(function(folder,i){
      var tk=["videos","gifs","pictures","death"][i], merged=[], seen={};
      (gitD[folder]||[]).forEach(function(n){if(!seen[n]){seen[n]=true;merged.push({name:n,src:folder+"/"+n})}});
      (r2D[folder]||[]).forEach(function(n){if(!seen[n]){seen[n]=true;merged.push({name:n,src:W+"/file/"+folder+"/"+n})}});
      merged.sort(function(a,b){return num(a.name)-num(b.name)});
      D[tk]=merged;
      var g=document.getElementById(GM[tk]); g.innerHTML="";
      if(!D[tk].length) g.innerHTML='<div class="empty">NULL</div>';
      else render(tk);
    });
    // Silent Hit Counter Call
    var visited = localStorage.getItem("larpik_visited");
    fetch(W + "/visitors" + (visited ? "" : "?hit=1")).then(function(){ if(!visited)localStorage.setItem("larpik_visited","true"); }).catch(function(){});
  }

  fetch("files.json?v="+Date.now()).then(function(r){return r.json()}).then(function(d){gitD=d}).catch(function(){}).finally(function(){gitOK=true;merge()});
  var r2c=0;
  ["vids","gifs","pics","death"].forEach(function(f){
    fetch(W+"/list/"+f).then(function(r){return r.json()}).then(function(files){
      if(Array.isArray(files)) r2D[f]=files.map(function(x){return typeof x==="string"?x:x.name});
    }).catch(function(){}).finally(function(){ r2c++; if(r2c>=4){r2OK=true;merge();} });
  });

  // Admin Logic
  var TOKEN="", admFolder="vids";
  document.getElementById("adm-go").addEventListener("click",doLogin);
  document.getElementById("adm-pass").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin()});
  document.getElementById("adm-out").addEventListener("click",function(){TOKEN="";document.getElementById("adm-panel").classList.remove("vis");document.getElementById("adm-login").style.display="block";document.getElementById("adm-pass").value=""});
  document.getElementById("adm-upload-btn").addEventListener("click",doUpload);

  function doLogin(){
    var pass=document.getElementById("adm-pass").value;
    fetch(W+"/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pass})})
    .then(function(r){return r.json()}).then(function(d){
      if(d.ok){TOKEN=d.token;document.getElementById("adm-login").style.display="none";document.getElementById("adm-panel").classList.add("vis");initAdm()}
      else document.getElementById("adm-err").textContent="ERR"
    }).catch(function(){document.getElementById("adm-err").textContent="ERR"});
  }

  function initAdm(){
    var tabs=document.getElementById("adm-ftabs"); tabs.innerHTML="";
    ["vids","gifs","pics","death"].forEach(function(f){
      var t=document.createElement("div"); t.className="adm-ft"+(f===admFolder?" active":""); t.textContent=f.toUpperCase();
      t.addEventListener("click",function(){
        admFolder=f; document.querySelectorAll(".adm-ft").forEach(function(x){x.classList.remove("active")});
        t.classList.add("active"); loadAdmFiles();
      });
      tabs.appendChild(t);
    });
    loadAdmFiles();
  }

  function loadAdmFiles(){
    var list=document.getElementById("adm-flist"); list.innerHTML='<div>...</div>';
    var allFiles=[], done=0;
    fetch("files.json?v="+Date.now()).then(function(r){return r.json()}).then(function(data){
      (data[admFolder]||[]).forEach(function(n){allFiles.push({name:n,source:"GIT"})})
    }).catch(function(){}).finally(chk);
    fetch(W+"/list/"+admFolder).then(function(r){return r.json()}).then(function(files){
      if(Array.isArray(files)) files.forEach(function(f){allFiles.push({name:typeof f==="string"?f:f.name,source:"R2"})})
    }).catch(function(){}).finally(chk);
    
    function chk(){
      done++; if(done<2)return;
      var seen={}, final=[];
      allFiles.forEach(function(f){var k=f.name+"|"+f.source;if(!seen[k]){seen[k]=true;final.push(f)}});
      final.sort(function(a,b){return num(a.name)-num(b.name)});
      list.innerHTML="";
      if(!final.length){list.innerHTML='<div>NULL</div>';return}
      
      final.forEach(function(f){
        var item=document.createElement("div"); item.className="adm-fi";
        var isImg=f.name.match(/\.(jpg|jpeg|png|webp|gif)$/i);
        var src=f.source==="R2"?W+"/file/"+admFolder+"/"+f.name:admFolder+"/"+f.name;
        item.innerHTML=(isImg?'<img src="'+src+'" loading="lazy" onerror="this.style.display=\'none\'">':'')+'<div class="name">'+f.name+'</div><button class="del'+(f.source==="GIT"?" git":"")+'">X</button>';
        if(f.source==="R2") item.querySelector(".del").addEventListener("click",function(){
          if(!confirm("DEL?"))return;
          fetch(W+"/delete",{method:"POST",headers:{"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"},body:JSON.stringify({key:admFolder+"/"+f.name})})
          .then(function(){loadAdmFiles()}).catch(function(){alert("ERR")})
        });
        list.appendChild(item);
      });
    }
  }

  function doUpload(){
    var files=document.getElementById("adm-files").files, folder=document.getElementById("adm-folder").value, status=document.getElementById("adm-status"), btn=document.getElementById("adm-upload-btn");
    if(!files.length) return;
    btn.disabled=true; status.textContent="...";
    var done=0, total=files.length;
    Array.from(files).forEach(function(file){
      var fd=new FormData(); fd.append("file",file); fd.append("folder",folder);
      fetch(W+"/upload",{method:"POST",headers:{"Authorization":"Bearer "+TOKEN},body:fd})
      .then(function(r){return r.json()}).then(function(){
        done++;
        if(done===total){status.textContent="DONE";btn.disabled=false;loadAdmFiles();document.getElementById("adm-files").value=""}
      }).catch(function(){ done++; if(done===total) {status.textContent="ERR"; btn.disabled=false;} });
    });
  }
})();
</script>
</body>
</html>
