<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LARPIK</title>
<link rel="icon" type="image/gif" href="https://media1.tenor.com/m/akwQ41N209EAAAAd/cute-dog-pibble.gif">
<meta name="theme-color" content="#0f172a">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* SLATE & AMBER - GEOMETRIC GRID THEME */
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface-hover: #334155;
  --border: #334155;
  --accent: #f59e0b; /* Amber */
  --text: #f8fafc;
  --text-muted: #94a3b8;
  --font: 'Outfit', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--bg);
  /* Subtle blueprint grid background */
  background-image: 
    linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  overflow-x: hidden;
  text-transform: uppercase;
}

body.on-admin .app-view { display: none; }
body.on-admin .adm-view { display: block; }

/* STICKY HEADER */
.hdr {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15, 23, 42, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 2px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 30px;
}
.brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.brand h1 {
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--accent);
  margin: 0;
  line-height: 1;
}
.brand span {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 1px;
}

.nav { display: flex; gap: 5px; }
.nav-btn {
  background: transparent;
  color: var(--text-muted);
  border: 2px solid transparent;
  padding: 8px 20px;
  font-family: var(--font);
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-btn:hover { background: var(--surface); color: var(--text); }
.nav-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

/* STRICT 1:1 GRID LAYOUT */
.main { padding: 30px; max-width: 1800px; margin: 0 auto; }
.panel { display: none; }
.panel.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.grid {
  display: grid;
  /* Auto-fitting square cells */
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* 1:1 MEDIA CARDS */
.card {
  background: var(--surface);
  border: 2px solid var(--border);
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1; /* Forces perfect square */
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
}
.card:hover {
  border-color: var(--accent);
  transform: scale(1.02);
  z-index: 2;
}

/* THE STRETCHING LOGIC */
.media {
  width: 100%;
  height: 100%;
  position: absolute;
  inset: 0;
}
.media video, .media img {
  width: 100%;
  height: 100%;
  object-fit: fill; /* STRICTLY STRETCHES TO 1:1 */
  display: block;
}

/* VIDEO UI */
.vw { width: 100%; height: 100%; cursor: pointer; }
.po {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(15, 23, 42, 0.4); opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
.vw.ip .po { opacity: 1; pointer-events: auto; }
.pi {
  width: 60px; height: 60px; background: var(--accent); color: var(--bg);
  display: flex; align-items: center; justify-content: center; border-radius: 50%;
}
.pi svg { width: 30px; height: 30px; fill: currentColor; margin-left: 4px; }

.cc {
  position: absolute; bottom: 0; left: 0; right: 0; padding: 15px;
  background: linear-gradient(transparent, rgba(15, 23, 42, 0.9));
  display: flex; align-items: center; gap: 10px; opacity: 0; transition: opacity 0.2s;
}
.vw:hover .cc, .vw.ip .cc { opacity: 1; }
.pb { flex-grow: 1; height: 4px; background: var(--border); cursor: pointer; position: relative; }
.pf { height: 100%; width: 0%; background: var(--accent); pointer-events: none; }
.vb { background: none; border: none; color: var(--text); cursor: pointer; display: flex; align-items: center; }
.vb svg { width: 20px; height: 20px; fill: currentColor; }

/* LOAD MORE */
.lmw { text-align: center; margin-top: 40px; padding-bottom: 40px; }
.lm {
  background: var(--surface); color: var(--text); border: 2px solid var(--border);
  font-family: var(--font); font-weight: 700; font-size: 1rem; padding: 12px 40px;
  cursor: pointer; transition: all 0.2s;
}
.lm:hover { border-color: var(--accent); color: var(--accent); }
.lm:disabled { opacity: 0; pointer-events: none; }
.empty { text-align: center; padding: 100px 0; font-weight: 700; color: var(--text-muted); font-size: 1.5rem; }

/* LIGHTBOX */
.lb { position: fixed; inset: 0; z-index: 9999; background: rgba(15, 23, 42, 0.95); display: none; align-items: center; justify-content: center; padding: 20px; }
.lb.open { display: flex; }
.lb img { max-width: 100%; max-height: 90vh; object-fit: contain; border: 2px solid var(--border); }
.lbc { position: absolute; top: 20px; right: 30px; font-size: 3rem; font-weight: 900; color: var(--text-muted); cursor: pointer; }
.lbc:hover { color: var(--accent); }

/* FOOTER */
.ftr { text-align: center; padding: 40px; font-weight: 700; color: var(--border); font-size: 1rem; }

/* ADMIN */
.adm-view { display: none; padding: 50px 20px; max-width: 900px; margin: 0 auto; }
.adm-login { max-width: 400px; margin: 15vh auto 0; background: var(--surface); padding: 40px; border: 2px solid var(--border); text-align: center; }
.adm-login input { width: 100%; background: var(--bg); border: 2px solid var(--border); color: var(--text); padding: 15px; font-family: var(--font); font-size: 1rem; margin-bottom: 20px; outline: none; text-align: center; }
.adm-login input:focus { border-color: var(--accent); }
.adm-login button { width: 100%; background: var(--accent); color: var(--bg); border: none; padding: 15px; font-family: var(--font); font-weight: 900; font-size: 1rem; cursor: pointer; }
.adm-err { color: #ef4444; margin-top: 15px; font-weight: 700; }

.adm-panel { display: none; background: var(--surface); padding: 30px; border: 2px solid var(--border); }
.adm-panel.vis { display: block; }
.adm-hdr { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
.adm-hdr h1 { font-size: 2rem; color: var(--accent); margin: 0; }
.adm-hdr button { background: var(--bg); border: 2px solid var(--border); color: var(--text); padding: 10px 20px; cursor: pointer; font-family: var(--font); font-weight: 700; }

.adm-row { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
.adm-row select, .adm-row input { background: var(--bg); border: 2px solid var(--border); color: var(--text); padding: 12px; font-family: var(--font); outline: none; }
.adm-btn { background: var(--accent); color: var(--bg); border: none; padding: 12px 30px; font-family: var(--font); font-weight: 900; cursor: pointer; }

.adm-ftabs { display: flex; gap: 10px; margin: 40px 0 20px; }
.adm-ft { padding: 8px 15px; font-weight: 700; color: var(--text-muted); cursor: pointer; border: 2px solid transparent; }
.adm-ft.active { border-color: var(--accent); color: var(--text); }
.adm-flist { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
.adm-fi { background: var(--bg); border: 2px solid var(--border); padding: 10px; display: flex; flex-direction: column; }
.adm-fi img { width: 100%; height: 100px; object-fit: cover; margin-bottom: 10px; }
.adm-fi .name { font-size: 0.8rem; word-break: break-all; margin-bottom: 10px; flex-grow: 1; }
.adm-fi .del { background: #ef4444; color: #fff; border: none; padding: 8px; font-weight: 900; cursor: pointer; font-family: var(--font); }
.adm-fi .del.git { background: var(--border); color: var(--text-muted); pointer-events: none; }
</style>
</head>
<body>

<div class="lb" id="lb"><div class="lbc" id="lbc">&times;</div><img id="lbi" src="" alt=""></div>

<div class="app-view">
  <header class="hdr">
    <div class="brand">
      <h1>LARPIK</h1>
      <span>NSM</span>
    </div>
    <nav class="nav">
      <button class="nav-btn active" data-tab="videos">VIDS</button>
      <button class="nav-btn" data-tab="gifs">GIFS</button>
      <button class="nav-btn" data-tab="pictures">PICS</button>
      <button class="nav-btn" data-tab="death">DEATH</button>
    </nav>
  </header>

  <main class="main">
    <div class="panel active" id="tab-videos">
      <div class="grid" id="gv"></div>
      <div class="lmw"><button class="lm" data-tab="videos" style="display:none">▼</button></div>
    </div>
    <div class="panel" id="tab-gifs">
      <div class="grid" id="gg"></div>
      <div class="lmw"><button class="lm" data-tab="gifs" style="display:none">▼</button></div>
    </div>
    <div class="panel" id="tab-pictures">
      <div class="grid" id="gp"></div>
      <div class="lmw"><button class="lm" data-tab="pictures" style="display:none">▼</button></div>
    </div>
    <div class="panel" id="tab-death">
      <div class="grid" id="gd"></div>
      <div class="lmw"><button class="lm" data-tab="death" style="display:none">▼</button></div>
    </div>
  </main>

  <footer class="ftr">LARPIK.COM</footer>
</div>

<div class="adm-view">
  <div class="adm-login" id="adm-login">
    <input type="password" id="adm-pass" placeholder="PASS" autocomplete="off">
    <button id="adm-go">ENTER</button>
    <div class="adm-err" id="adm-err"></div>
  </div>
  
  <div class="adm-panel" id="adm-panel">
    <div class="adm-hdr">
      <h1>LARPIK</h1>
      <button id="adm-out">EXIT</button>
    </div>
    
    <div class="adm-row">
      <select id="adm-folder">
        <option value="vids">VIDS</option>
        <option value="gifs">GIFS</option>
        <option value="pics">PICS</option>
        <option value="death">DEATH</option>
      </select>
      <input type="file" id="adm-files" multiple accept="video/*,image/*,.gif">
      <button class="adm-btn" id="adm-upload-btn">UPLOAD</button>
    </div>
    <div id="adm-status" style="font-weight:700; margin-bottom:20px;"></div>

    <div class="adm-ftabs" id="adm-ftabs"></div>
    <div class="adm-flist" id="adm-flist"></div>
  </div>
</div>

<script>
(function(){
  var W="https://worker.vokemane.workers.dev", B=12;
  var VE=[".mp4",".webm",".mov"],GE=[".gif"];
  function isV(n){return VE.some(function(e){return n.toLowerCase().endsWith(e)})}
  function isG(n){return GE.some(function(e){return n.toLowerCase().endsWith(e)})}
  function num(n){var m=n.match(/\d+/);return m?parseInt(m[0]):999999}
  
  var D={videos:[],gifs:[],pictures:[],death:[]};
  var S={videos:0,gifs:0,pictures:0,death:0};
  var GM={videos:"gv",gifs:"gg",pictures:"gp",death:"gd"};
  
  var isAdmin=location.pathname==="/admin"||location.pathname==="/admin/";
  if(isAdmin) document.body.classList.add("on-admin");

  // Nav Logic
  document.querySelectorAll(".nav-btn").forEach(function(t){
    t.addEventListener("click",function(){
      document.querySelectorAll(".nav-btn").forEach(function(x){x.classList.remove("active");});
      document.querySelectorAll(".panel").forEach(function(x){x.classList.remove("active");});
      t.classList.add("active");
      document.getElementById("tab-"+t.dataset.tab).classList.add("active");
      window.scrollTo(0,0);
    });
  });

  // Lightbox
  var LB=document.getElementById("lb"), LBI=document.getElementById("lbi");
  document.getElementById("lbc").addEventListener("click",function(){LB.classList.remove("open")});
  LB.addEventListener("click",function(e){if(e.target===LB)LB.classList.remove("open")});
  function openLB(s){LBI.src=s;LB.classList.add("open")}

  // SVG Icons
  var PlayI='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  var VolI='<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>';
  var MuteI='<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>';

  // Video Logic
  function initVid(card){
    var w=card.querySelector(".vw"), v=w.querySelector("video"), po=w.querySelector(".po"), pb=w.querySelector(".pb"), pf=w.querySelector(".pf"), vb=w.querySelector(".vb");
    function tog(){ if(v.paused){v.play(); w.classList.remove("ip"); po.style.display="none";} else {v.pause(); w.classList.add("ip"); po.style.display="flex";} }
    v.addEventListener("click",tog); po.addEventListener("click",tog);
    v.addEventListener("timeupdate",function(){ if(pf&&v.duration) pf.style.width=(v.currentTime/v.duration*100)+"%"; });
    v.addEventListener("ended",function(){ w.classList.add("ip"); po.style.display="flex"; });
    if(pb) pb.addEventListener("click",function(e){ e.stopPropagation(); var r=pb.getBoundingClientRect(); v.currentTime=((e.clientX-r.left)/r.width)*v.duration; });
    if(vb){ vb.addEventListener("click",function(e){ e.stopPropagation(); v.muted=!v.muted; vb.innerHTML=v.muted?MuteI:VolI; }); }
  }

  function mkVid(it){
    var c=document.createElement("div"); c.className="card";
    c.innerHTML='<div class="vw ip"><div class="media"><video src="'+it.src+'" playsinline preload="metadata"></video></div><div class="po"><div class="pi">'+PlayI+'</div></div><div class="cc"><div class="pb"><div class="pf"></div></div><button class="vb">'+VolI+'</button></div></div>';
    initVid(c); return c;
  }
  function mkImg(it){
    var c=document.createElement("div"); c.className="card";
    c.innerHTML='<div class="media"><img src="'+it.src+'" loading="lazy"></div>';
    c.querySelector("img").addEventListener("click",function(){openLB(it.src)}); return c;
  }

  function render(tk){
    var f=D[tk]; if(!f||!f.length)return;
    var grid=document.getElementById(GM[tk]), btn=document.querySelector('.lm[data-tab="'+tk+'"]');
    var s=S[tk], e=Math.min(s+B,f.length);
    for(var i=s;i<e;i++){ grid.appendChild(isV(f[i].name) ? mkVid(f[i]) : mkImg(f[i])); }
    S[tk]=e;
    if(e>=f.length) btn.disabled=true;
    if(f.length>0) btn.style.display="";
  }

  document.querySelectorAll(".lm").forEach(function(b){b.addEventListener("click",function(){render(b.dataset.tab)})});

  // Fetch Logic
  var gitOK=false, r2OK=false, gitD={}, r2D={};
  function merge(){
    if(!gitOK||!r2OK)return;
    ["vids","gifs","pics","death"].forEach(function(folder,i){
      var tk=["videos","gifs","pictures","death"][i], merged=[], seen={};
      (gitD[folder]||[]).forEach(function(n){if(!seen[n]){seen[n]=true;merged.push({name:n,src:folder+"/"+n})}});
      (r2D[folder]||[]).forEach(function(n){if(!seen[n]){seen[n]=true;merged.push({name:n,src:W+"/file/"+folder+"/"+n})}});
      merged.sort(function(a,b){return num(a.name)-num(b.name)});
      D[tk]=merged;
      var g=document.getElementById(GM[tk]); g.innerHTML="";
      if(!D[tk].length) g.innerHTML='<div class="empty">NULL</div>';
      else render(tk);
    });
    // Silent Visit Counter
    var visited = localStorage.getItem("larpik_visited");
    fetch(W + "/visitors" + (visited ? "" : "?hit=1")).then(function(){ if(!visited)localStorage.setItem("larpik_visited","true"); }).catch(function(){});
  }

  fetch("files.json?v="+Date.now()).then(function(r){return r.json()}).then(function(d){gitD=d}).catch(function(){}).finally(function(){gitOK=true;merge()});
  var r2c=0;
  ["vids","gifs","pics","death"].forEach(function(f){
    fetch(W+"/list/"+f).then(function(r){return r.json()}).then(function(files){
      if(Array.isArray(files)) r2D[f]=files.map(function(x){return typeof x==="string"?x:x.name});
    }).catch(function(){}).finally(function(){ r2c++; if(r2c>=4){r2OK=true;merge();} });
  });

  // Admin
  var TOKEN="", admFolder="vids";
  document.getElementById("adm-go").addEventListener("click",doLogin);
  document.getElementById("adm-pass").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin()});
  document.getElementById("adm-out").addEventListener("click",function(){TOKEN="";document.getElementById("adm-panel").classList.remove("vis");document.getElementById("adm-login").style.display="block";document.getElementById("adm-pass").value=""});
  document.getElementById("adm-upload-btn").addEventListener("click",doUpload);

  function doLogin(){
    var pass=document.getElementById("adm-pass").value;
    fetch(W+"/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pass})})
    .then(function(r){return r.json()}).then(function(d){
      if(d.ok){TOKEN=d.token;document.getElementById("adm-login").style.display="none";document.getElementById("adm-panel").classList.add("vis");initAdm()}
      else document.getElementById("adm-err").textContent="ERR"
    }).catch(function(){document.getElementById("adm-err").textContent="ERR"});
  }

  function initAdm(){
    var tabs=document.getElementById("adm-ftabs"); tabs.innerHTML="";
    ["vids","gifs","pics","death"].forEach(function(f){
      var t=document.createElement("div"); t.className="adm-ft"+(f===admFolder?" active":""); t.textContent=f.toUpperCase();
      t.addEventListener("click",function(){
        admFolder=f; document.querySelectorAll(".adm-ft").forEach(function(x){x.classList.remove("active")});
        t.classList.add("active"); loadAdmFiles();
      });
      tabs.appendChild(t);
    });
    loadAdmFiles();
  }

  function loadAdmFiles(){
    var list=document.getElementById("adm-flist"); list.innerHTML='<div>...</div>';
    var allFiles=[], done=0;
    fetch("files.json?v="+Date.now()).then(function(r){return r.json()}).then(function(data){
      (data[admFolder]||[]).forEach(function(n){allFiles.push({name:n,source:"GIT"})})
    }).catch(function(){}).finally(chk);
    fetch(W+"/list/"+admFolder).then(function(r){return r.json()}).then(function(files){
      if(Array.isArray(files)) files.forEach(function(f){allFiles.push({name:typeof f==="string"?f:f.name,source:"R2"})})
    }).catch(function(){}).finally(chk);
    
    function chk(){
      done++; if(done<2)return;
      var seen={}, final=[];
      allFiles.forEach(function(f){var k=f.name+"|"+f.source;if(!seen[k]){seen[k]=true;final.push(f)}});
      final.sort(function(a,b){return num(a.name)-num(b.name)});
      list.innerHTML="";
      if(!final.length){list.innerHTML='<div>NULL</div>';return}
      
      final.forEach(function(f){
        var item=document.createElement("div"); item.className="adm-fi";
        var isImg=f.name.match(/\.(jpg|jpeg|png|webp|gif)$/i);
        var src=f.source==="R2"?W+"/file/"+admFolder+"/"+f.name:admFolder+"/"+f.name;
        item.innerHTML=(isImg?'<img src="'+src+'" loading="lazy" onerror="this.style.display=\'none\'">':'')+'<div class="name">'+f.name+'</div><button class="del'+(f.source==="GIT"?" git":"")+'">X</button>';
        if(f.source==="R2") item.querySelector(".del").addEventListener("click",function(){
          if(!confirm("DEL?"))return;
          fetch(W+"/delete",{method:"POST",headers:{"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"},body:JSON.stringify({key:admFolder+"/"+f.name})})
          .then(function(){loadAdmFiles()}).catch(function(){alert("ERR")})
        });
        list.appendChild(item);
      });
    }
  }

  function doUpload(){
    var files=document.getElementById("adm-files").files, folder=document.getElementById("adm-folder").value, status=document.getElementById("adm-status"), btn=document.getElementById("adm-upload-btn");
    if(!files.length) return;
    btn.disabled=true; status.textContent="...";
    var done=0, total=files.length;
    Array.from(files).forEach(function(file){
      var fd=new FormData(); fd.append("file",file); fd.append("folder",folder);
      fetch(W+"/upload",{method:"POST",headers:{"Authorization":"Bearer "+TOKEN},body:fd})
      .then(function(r){return r.json()}).then(function(){
        done++;
        if(done===total){status.textContent="";btn.disabled=false;loadAdmFiles();document.getElementById("adm-files").value=""}
      }).catch(function(){ done++; if(done===total) {status.textContent="ERR"; btn.disabled=false;} });
    });
  }
})();
</script>
</body>
</html>
