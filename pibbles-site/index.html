<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LARPIK</title>
<link rel="icon" type="image/gif" href="https://media1.tenor.com/m/akwQ41N209EAAAAd/cute-dog-pibble.gif">
<meta name="theme-color" content="#0a0514">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* MIDNIGHT GLASS THEME */
:root {
  --bg-dark: #07030f;
  --bg-glow: #1a0b2e;
  --glass: rgba(255, 255, 255, 0.02);
  --glass-hover: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.05);
  --neon: #8b5cf6;
  --neon-dim: rgba(139, 92, 246, 0.3);
  --text: #ffffff;
  --text-dim: rgba(255, 255, 255, 0.4);
  --font: 'Space Grotesk', sans-serif;
  --radius: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--bg-dark);
  background-image: radial-gradient(circle at 50% 0%, var(--bg-glow) 0%, transparent 70%);
  background-attachment: fixed;
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body.on-admin .main-app { display: none; }
body.on-admin .admin-app { display: flex; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--neon); }

/* HERO & NAV */
.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px 40px;
  position: relative;
  z-index: 10;
}
.title {
  font-size: 3rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-shadow: 0 0 40px var(--neon-dim);
  margin-bottom: 5px;
}
.subtitle {
  font-size: 0.8rem;
  font-weight: 300;
  letter-spacing: 0.5em;
  color: var(--neon);
  margin-bottom: 40px;
  text-transform: uppercase;
}

.nav {
  display: flex;
  gap: 10px;
  background: var(--glass);
  padding: 8px;
  border-radius: 40px;
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
}
.nav-btn {
  background: transparent;
  color: var(--text-dim);
  border: none;
  padding: 10px 24px;
  font-family: var(--font);
  font-size: 0.8rem;
  font-weight: 400;
  letter-spacing: 0.1em;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
}
.nav-btn:hover { color: var(--text); background: var(--glass-hover); }
.nav-btn.active { color: #fff; background: var(--neon); box-shadow: 0 0 20px var(--neon-dim); }

/* MAIN GRID */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 20px 100px;
}
.panel { display: none; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.panel.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.masonry {
  columns: 4;
  column-gap: 20px;
}
@media (max-width: 1200px) { .masonry { columns: 3; } }
@media (max-width: 800px) { .masonry { columns: 2; } }
@media (max-width: 500px) { .masonry { columns: 1; } }

/* MEDIA CARDS */
.card {
  break-inside: avoid;
  margin-bottom: 20px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  backdrop-filter: blur(10px);
  transition: all 0.4s ease;
  position: relative;
}
.card:hover {
  transform: translateY(-5px);
  border-color: var(--neon);
  box-shadow: 0 10px 30px var(--neon-dim);
}

.media-wrap { position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.media-wrap img, .media-wrap video { width: 100%; display: block; object-fit: contain; }
.media-wrap img { cursor: zoom-in; transition: transform 0.5s ease; }
.card:hover .media-wrap img { transform: scale(1.03); }

/* VIDEO CONTROLS */
.vw { position: relative; }
.po { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s; cursor: pointer; pointer-events: none; }
.vw.ip .po { opacity: 1; pointer-events: auto; }
.pi { width: 50px; height: 50px; border-radius: 50%; background: var(--neon); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--neon-dim); }
.pi svg { width: 20px; height: 20px; fill: #fff; margin-left: 3px; }

.cc { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 15px 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); display: flex; align-items: center; gap: 10px; opacity: 0; transition: opacity 0.3s; }
.vw:hover .cc, .vw.ip .cc { opacity: 1; }
.pb { flex-grow: 1; height: 3px; background: rgba(255,255,255,0.1); border-radius: 3px; cursor: pointer; overflow: hidden; }
.pf { height: 100%; width: 0%; background: var(--neon); pointer-events: none; transition: width 0.1s linear; }
.vb { background: none; border: none; color: var(--text); cursor: pointer; display: flex; align-items: center; }
.vb svg { width: 16px; height: 16px; opacity: 0.7; transition: opacity 0.2s; }
.vb:hover svg { opacity: 1; }
.vs { -webkit-appearance: none; width: 50px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 3px; cursor: pointer; outline: none; }
.vs::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #fff; }

/* UI */
.lmw { text-align: center; padding: 40px 0; }
.lm { background: var(--glass); border: 1px solid var(--border); color: var(--text); font-family: var(--font); padding: 12px 40px; border-radius: 30px; font-size: 0.8rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s; }
.lm:hover { background: var(--neon); border-color: var(--neon); box-shadow: 0 0 20px var(--neon-dim); }
.lm:disabled { opacity: 0; pointer-events: none; }
.empty { text-align: center; padding: 100px 0; color: var(--text-dim); font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; }

/* LIGHTBOX */
.lb { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; }
.lb.open { display: flex; animation: fadeUp 0.3s ease; }
.lb img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
.lbc { position: absolute; top: 30px; right: 40px; color: var(--text-dim); font-size: 40px; cursor: pointer; transition: color 0.3s; line-height: 1; }
.lbc:hover { color: #fff; }

/* FOOTER */
.ftr { text-align: center; padding: 40px; border-top: 1px solid var(--border); }
.ftr span { font-size: 0.7rem; letter-spacing: 0.3em; color: var(--text-dim); text-transform: uppercase; }

/* ADMIN - GLASSMORPHISM */
.admin-app { min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 20px; }
.adm-wrap { width: 100%; max-width: 900px; }

.adm-login { background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(20px); border-radius: var(--radius); padding: 50px; text-align: center; max-width: 400px; margin: 0 auto; }
.adm-login input { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; color: #fff; font-family: var(--font); padding: 15px; width: 100%; margin-bottom: 20px; outline: none; text-align: center; transition: border-color 0.3s; }
.adm-login input:focus { border-color: var(--neon); }
.adm-login button { background: var(--neon); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 8px; font-family: var(--font); cursor: pointer; letter-spacing: 0.1em; transition: box-shadow 0.3s; }
.adm-login button:hover { box-shadow: 0 0 20px var(--neon-dim); }
.adm-err { color: #ff3366; margin-top: 15px; font-size: 0.8rem; }

.adm-panel { display: none; background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(20px); border-radius: var(--radius); padding: 40px; }
.adm-panel.vis { display: block; }
.adm-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
.adm-hdr h1 { font-size: 1.5rem; letter-spacing: 0.2em; text-shadow: 0 0 20px var(--neon-dim); }
.adm-hdr button { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: all 0.3s; font-family: var(--font); font-size: 0.8rem; }
.adm-hdr button:hover { background: var(--glass-hover); border-color: var(--text-dim); }

.adm-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.adm-row select, .adm-row input { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-family: var(--font); outline: none; }
.adm-btn { background: var(--neon); color: #fff; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-family: var(--font); transition: box-shadow 0.3s; }
.adm-btn:hover { box-shadow: 0 0 20px var(--neon-dim); }

.adm-ftabs { display: flex; gap: 10px; margin: 40px 0 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
.adm-ft { font-size: 0.8rem; letter-spacing: 0.1em; color: var(--text-dim); cursor: pointer; padding: 5px 10px; border-radius: 6px; transition: all 0.3s; text-transform: uppercase;}
.adm-ft.active { color: #fff; background: var(--glass-hover); }

.adm-flist { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
.adm-fi { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 10px; padding: 10px; display: flex; flex-direction: column; }
.adm-fi img { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }
.adm-fi .name { font-size: 0.7rem; color: var(--text-dim); word-break: break-all; margin-bottom: 10px; flex-grow: 1; }
.adm-fi .del { background: transparent; border: 1px solid rgba(255, 51, 102, 0.3); color: #ff3366; padding: 8px; border-radius: 6px; cursor: pointer; transition: all 0.3s; font-family: var(--font); }
.adm-fi .del:hover { background: rgba(255, 51, 102, 0.1); border-color: #ff3366; }
.adm-fi .del.git { opacity: 0.2; pointer-events: none; border-color: var(--border); color: var(--text-dim); }

/* LOADER */
#loader { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: transparent; z-index: 9999; }
#loader-bar { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: width 0.3s ease, opacity 0.3s; }
</style>
</head>
<body>

<div id="loader"><div id="loader-bar"></div></div>
<div class="lb" id="lb"><div class="lbc" id="lbc">&times;</div><img id="lbi" src="" alt=""></div>

<div class="main-app">
  <header class="header">
    <div class="title">LARPIK</div>
    <div class="subtitle">nsm</div>
    
    <nav class="nav">
      <button class="nav-btn active" data-tab="videos">VIDS</button>
      <button class="nav-btn" data-tab="gifs">GIFS</button>
      <button class="nav-btn" data-tab="pictures">PICS</button>
      <button class="nav-btn" data-tab="death">DEATH</button>
    </nav>
  </header>

  <main class="container">
    <div class="panel active" id="tab-videos">
      <div class="masonry" id="gv"></div>
      <div class="lmw"><button class="lm" data-tab="videos" style="display:none">▼</button></div>
    </div>
    <div class="panel" id="tab-gifs">
      <div class="masonry" id="gg"></div>
      <div class="lmw"><button class="lm" data-tab="gifs" style="display:none">▼</button></div>
    </div>
    <div class="panel" id="tab-pictures">
      <div class="masonry" id="gp"></div>
      <div class="lmw"><button class="lm" data-tab="pictures" style="display:none">▼</button></div>
    </div>
    <div class="panel" id="tab-death">
      <div class="masonry" id="gd"></div>
      <div class="lmw"><button class="lm" data-tab="death" style="display:none">▼</button></div>
    </div>
  </main>

  <footer class="ftr">
    <span>larpik.com</span>
  </footer>
</div>

<div class="admin-app">
  <div class="adm-wrap">
    <div class="adm-login" id="adm-login">
      <input type="password" id="adm-pass" placeholder="PASS" autocomplete="off">
      <button id="adm-go">ENTER</button>
      <div class="adm-err" id="adm-err"></div>
    </div>
    
    <div class="adm-panel" id="adm-panel">
      <div class="adm-hdr">
        <h1>LARPIK</h1>
        <button id="adm-out">EXIT</button>
      </div>
      
      <div class="adm-row">
        <select id="adm-folder">
          <option value="vids">VIDS</option>
          <option value="gifs">GIFS</option>
          <option value="pics">PICS</option>
          <option value="death">DEATH</option>
        </select>
        <input type="file" id="adm-files" multiple accept="video/*,image/*,.gif">
        <button class="adm-btn" id="adm-upload-btn">UPLOAD</button>
      </div>
      <div id="adm-status" style="font-size:0.8rem; color:var(--text-dim);"></div>

      <div class="adm-ftabs" id="adm-ftabs"></div>
      <div class="adm-flist" id="adm-flist"></div>
    </div>
  </div>
</div>

<script>
(function(){
  var W="https://worker.vokemane.workers.dev", B=12;
  var VE=[".mp4",".webm",".mov"],GE=[".gif"];
  function isV(n){return VE.some(function(e){return n.toLowerCase().endsWith(e)})}
  function isG(n){return GE.some(function(e){return n.toLowerCase().endsWith(e)})}
  function num(n){var m=n.match(/\d+/);return m?parseInt(m[0]):999999}
  
  var D={videos:[],gifs:[],pictures:[],death:[]};
  var S={videos:0,gifs:0,pictures:0,death:0};
  var GM={videos:"gv",gifs:"gg",pictures:"gp",death:"gd"};
  
  var isAdmin=location.pathname==="/admin"||location.pathname==="/admin/";
  if(isAdmin) document.body.classList.add("on-admin");

  // Loader
  var lBar = document.getElementById("loader-bar"), lProg = 0;
  var lInt = setInterval(function(){ lProg+=15; if(lProg>90)lProg=90; lBar.style.width=lProg+"%"; }, 100);
  function finishLoad(){ clearInterval(lInt); lBar.style.width="100%"; setTimeout(function(){lBar.style.opacity="0";},300); }

  // Nav Logic
  document.querySelectorAll(".nav-btn").forEach(function(t){
    t.addEventListener("click",function(){
      document.querySelectorAll(".nav-btn").forEach(function(x){x.classList.remove("active");});
      document.querySelectorAll(".panel").forEach(function(x){x.classList.remove("active");});
      t.classList.add("active");
      document.getElementById("tab-"+t.dataset.tab).classList.add("active");
    });
  });

  // Lightbox
  var LB=document.getElementById("lb"), LBI=document.getElementById("lbi");
  document.getElementById("lbc").addEventListener("click",function(){LB.classList.remove("open")});
  LB.addEventListener("click",function(e){if(e.target===LB)LB.classList.remove("open")});
  function openLB(s){LBI.src=s;LB.classList.add("open")}

  // SVG Icons
  var VOn='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
  var VOff='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
  var PlayI='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';

  // Video Logic
  function initVid(card){
    var w=card.querySelector(".vw"), v=w.querySelector("video"), po=w.querySelector(".po"), pb=w.querySelector(".pb"), pf=w.querySelector(".pf"), vb=w.querySelector(".vb"), vs=w.querySelector(".vs");
    function tog(){ if(v.paused){v.play(); w.classList.remove("ip"); po.style.display="none";} else {v.pause(); w.classList.add("ip"); po.style.display="flex";} }
    v.addEventListener("click",tog); po.addEventListener("click",tog);
    v.addEventListener("timeupdate",function(){ if(pf&&v.duration) pf.style.width=(v.currentTime/v.duration*100)+"%"; });
    v.addEventListener("ended",function(){ w.classList.add("ip"); po.style.display="flex"; });
    if(pb) pb.addEventListener("click",function(e){ e.stopPropagation(); var r=pb.getBoundingClientRect(); v.currentTime=((e.clientX-r.left)/r.width)*v.duration; });
    if(vs){ vs.value=v.volume; vs.addEventListener("input",function(e){ e.stopPropagation(); v.volume=parseFloat(this.value); v.muted=v.volume===0; if(vb)vb.innerHTML=v.muted?VOff:VOn; }); }
    if(vb){ vb.innerHTML=VOn; vb.addEventListener("click",function(e){ e.stopPropagation(); v.muted=!v.muted; vb.innerHTML=v.muted?VOff:VOn; if(vs)vs.value=v.muted?0:v.volume; }); }
  }

  function mkVid(it){
    var c=document.createElement("div"); c.className="card";
    c.innerHTML='<div class="vw ip"><div class="media-wrap"><video src="'+it.src+'" playsinline preload="metadata"></video></div><div class="po"><div class="pi">'+PlayI+'</div></div><div class="cc"><div class="pb"><div class="pf"></div></div><button class="vb"></button><input type="range" class="vs" min="0" max="1" step="0.05" value="1"></div></div>';
    initVid(c); return c;
  }
  function mkImg(it){
    var c=document.createElement("div"); c.className="card";
    c.innerHTML='<div class="media-wrap"><img src="'+it.src+'" loading="lazy"></div>';
    c.querySelector("img").addEventListener("click",function(){openLB(it.src)}); return c;
  }

  function render(tk){
    var f=D[tk]; if(!f||!f.length)return;
    var grid=document.getElementById(GM[tk]), btn=document.querySelector('.lm[data-tab="'+tk+'"]');
    var s=S[tk], e=Math.min(s+B,f.length);
    for(var i=s;i<e;i++){ grid.appendChild(isV(f[i].name) ? mkVid(f[i]) : mkImg(f[i])); }
    S[tk]=e;
    if(e>=f.length) btn.disabled=true;
    if(f.length>0) btn.style.display="";
  }

  document.querySelectorAll(".lm").forEach(function(b){b.addEventListener("click",function(){render(b.dataset.tab)})});

  // Fetch Logic
  var gitOK=false, r2OK=false, gitD={}, r2D={};
  function merge(){
    if(!gitOK||!r2OK)return;
    ["vids","gifs","pics","death"].forEach(function(folder,i){
      var tk=["videos","gifs","pictures","death"][i], merged=[], seen={};
      (gitD[folder]||[]).forEach(function(n){if(!seen[n]){seen[n]=true;merged.push({name:n,src:folder+"/"+n})}});
      (r2D[folder]||[]).forEach(function(n){if(!seen[n]){seen[n]=true;merged.push({name:n,src:W+"/file/"+folder+"/"+n})}});
      merged.sort(function(a,b){return num(a.name)-num(b.name)});
      D[tk]=merged;
      var g=document.getElementById(GM[tk]); g.innerHTML="";
      if(!D[tk].length) g.innerHTML='<div class="empty">NULL</div>';
      else render(tk);
    });
    finishLoad();
  }

  fetch("files.json?v="+Date.now()).then(function(r){return r.json()}).then(function(d){gitD=d}).catch(function(){}).finally(function(){gitOK=true;merge()});
  var r2c=0;
  ["vids","gifs","pics","death"].forEach(function(f){
    fetch(W+"/list/"+f).then(function(r){return r.json()}).then(function(files){
      if(Array.isArray(files)) r2D[f]=files.map(function(x){return typeof x==="string"?x:x.name});
    }).catch(function(){}).finally(function(){ r2c++; if(r2c>=4){r2OK=true;merge();} });
  });

  // Admin
  var TOKEN="", admFolder="vids";
  document.getElementById("adm-go").addEventListener("click",doLogin);
  document.getElementById("adm-pass").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin()});
  document.getElementById("adm-out").addEventListener("click",function(){TOKEN="";document.getElementById("adm-panel").classList.remove("vis");document.getElementById("adm-login").style.display="block";document.getElementById("adm-pass").value=""});
  document.getElementById("adm-upload-btn").addEventListener("click",doUpload);

  function doLogin(){
    var pass=document.getElementById("adm-pass").value;
    fetch(W+"/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pass})})
    .then(function(r){return r.json()}).then(function(d){
      if(d.ok){TOKEN=d.token;document.getElementById("adm-login").style.display="none";document.getElementById("adm-panel").classList.add("vis");initAdm()}
      else document.getElementById("adm-err").textContent="ERR"
    }).catch(function(){document.getElementById("adm-err").textContent="ERR"});
  }

  function initAdm(){
    var tabs=document.getElementById("adm-ftabs"); tabs.innerHTML="";
    ["vids","gifs","pics","death"].forEach(function(f){
      var t=document.createElement("div"); t.className="adm-ft"+(f===admFolder?" active":""); t.textContent=f;
      t.addEventListener("click",function(){
        admFolder=f; document.querySelectorAll(".adm-ft").forEach(function(x){x.classList.remove("active")});
        t.classList.add("active"); loadAdmFiles();
      });
      tabs.appendChild(t);
    });
    loadAdmFiles();
  }

  function loadAdmFiles(){
    var list=document.getElementById("adm-flist"); list.innerHTML='<div style="color:var(--text-dim);font-size:0.8rem">...</div>';
    var allFiles=[], done=0;
    fetch("files.json?v="+Date.now()).then(function(r){return r.json()}).then(function(data){
      (data[admFolder]||[]).forEach(function(n){allFiles.push({name:n,source:"GIT"})})
    }).catch(function(){}).finally(chk);
    fetch(W+"/list/"+admFolder).then(function(r){return r.json()}).then(function(files){
      if(Array.isArray(files)) files.forEach(function(f){allFiles.push({name:typeof f==="string"?f:f.name,source:"R2"})})
    }).catch(function(){}).finally(chk);
    
    function chk(){
      done++; if(done<2)return;
      var seen={}, final=[];
      allFiles.forEach(function(f){var k=f.name+"|"+f.source;if(!seen[k]){seen[k]=true;final.push(f)}});
      final.sort(function(a,b){return num(a.name)-num(b.name)});
      list.innerHTML="";
      if(!final.length){list.innerHTML='<div style="color:var(--text-dim);font-size:0.8rem">NULL</div>';return}
      
      final.forEach(function(f){
        var item=document.createElement("div"); item.className="adm-fi";
        var isImg=f.name.match(/\.(jpg|jpeg|png|webp|gif)$/i);
        var src=f.source==="R2"?W+"/file/"+admFolder+"/"+f.name:admFolder+"/"+f.name;
        item.innerHTML=(isImg?'<img src="'+src+'" loading="lazy" onerror="this.style.display=\'none\'">':'')+'<div class="name">'+f.name+'</div><button class="del'+(f.source==="GIT"?" git":"")+'">X</button>';
        if(f.source==="R2") item.querySelector(".del").addEventListener("click",function(){
          if(!confirm("DEL?"))return;
          fetch(W+"/delete",{method:"POST",headers:{"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"},body:JSON.stringify({key:admFolder+"/"+f.name})})
          .then(function(){loadAdmFiles()}).catch(function(){alert("ERR")})
        });
        list.appendChild(item);
      });
    }
  }

  function doUpload(){
    var files=document.getElementById("adm-files").files, folder=document.getElementById("adm-folder").value, status=document.getElementById("adm-status"), btn=document.getElementById("adm-upload-btn");
    if(!files.length) return;
    btn.disabled=true; status.textContent="...";
    var done=0, total=files.length;
    Array.from(files).forEach(function(file){
      var fd=new FormData(); fd.append("file",file); fd.append("folder",folder);
      fetch(W+"/upload",{method:"POST",headers:{"Authorization":"Bearer "+TOKEN},body:fd})
      .then(function(r){return r.json()}).then(function(){
        done++;
        if(done===total){status.textContent="";btn.disabled=false;loadAdmFiles();document.getElementById("adm-files").value=""}
      }).catch(function(){ done++; if(done===total) {status.textContent="ERR"; btn.disabled=false;} });
    });
  }

  if(isAdmin) setTimeout(finishLoad,600);
})();
</script>
</body>
</html>
